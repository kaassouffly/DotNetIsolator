name: BuildAll

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '10.0.x' ]
    steps:
    - name: Get package version suffix
      run: echo "PACKAGE_VERSION_SUFFIX=preview.$(printf $((${{ github.run_number }}+10000)))" >> $GITHUB_ENV
    - uses: actions/checkout@v4
    - name: Setup .NET Core SDK ${{ matrix.dotnet-version }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    - name: Install wasi-sdk 25.0
      run: |
        mkdir wasi-sdk
        cd wasi-sdk
        wget https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sdk-25.0-x86_64-linux.tar.gz
        tar xf wasi-sdk-*.tar.gz --strip-components 1
        echo "WASI_SDK_PATH=$PWD" >> $GITHUB_ENV
        echo Set WASI_SDK_PATH to $PWD
    - name: Install wasi-experimental workload
      run: dotnet workload install wasi-experimental
    - name: .NET restore
      run: dotnet restore
    - name: Publish DotNetIsolator.WasmApp
      # The new Microsoft.NET.Runtime.WebAssembly.Wasi.Sdk only emits the trimmed single-file .wasm
      # during 'Publish'; the host's BuildWasmAppForPublish target depends on this output existing.
      run: dotnet publish src/DotNetIsolator.WasmApp -c Release --no-restore
    - name: .NET test
      run: dotnet test test/DotNetIsolator.Test --no-restore --verbosity normal
    - name: .NET pack
      run: |
        dotnet pack src/DotNetIsolator -c Release --no-restore /p:VersionSuffix=${{ env.PACKAGE_VERSION_SUFFIX }}
        dotnet pack src/DotNetIsolator.Guest -c Release --no-restore /p:VersionSuffix=${{ env.PACKAGE_VERSION_SUFFIX }}
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: artifacts/*.nupkg
        if-no-files-found: error
